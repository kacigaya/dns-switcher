name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: make app

      - name: Create DMG
        run: make dmg

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: DNSSwitcher.dmg
